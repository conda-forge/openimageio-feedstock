schema_version: 1

context:
  version: "3.1.12.0" # https://github.com/AcademySoftwareFoundation/OpenImageIO/releases
  ocio_version: "2.5.1" # https://github.com/AcademySoftwareFoundation/OpenColorIO/releases
  build_number: 0

recipe:
  name: openimageio-split
  version: ${{ version }}

source:
  - url: https://github.com/AcademySoftwareFoundation/OpenImageIO/releases/download/v${{ version }}/OpenImageIO-${{ version }}.tar.gz
    sha256: 704511376faf32767cdcd9aa9a6d0be2b03b91f849ad9008227dc9f0e14bc265
    target_directory: oiio_src
  - url: https://github.com/AcademySoftwareFoundation/OpenColorIO/releases/download/v${{ ocio_version }}/OpenColorIO-${{ ocio_version }}.tar.gz
    sha256: 49ab04d023d7a7a7237e24f2cfead3171b0ff7f466ce20e6e32859ec8c7cc94b
    target_directory: ocio_src

build:
  number: ${{ build_number }}

outputs:
  - package:
      name: opencolorio
      version: ${{ ocio_version }}
    build:
      number: ${{ build_number }}
      script:
        env:
          OCIO_BUILD_APPS: "OFF"
          OCIO_BUILD_PYTHON: "OFF"
          OCIO_USE_OIIO_FOR_APPS: "OFF"
        file: build-opencolorio
    requirements:
      run_exports:
        weak:
          - ${{ pin_subpackage("opencolorio", lower_bound="x.x", upper_bound="x.x") }}
      build:
        - ${{ compiler("cxx") }}
        - cmake >=3.15
        - ninja
        - if: not win
          then: make
      host:
        # Min versions from OpenColorIO/share/cmake/modules/FindExtPackages.cmake
        - yaml-cpp >=0.8.0
        - minizip >=4.0.0
        - zlib >=1.2.13
        - imath >=3.1.1
        - pystring >=1.1.3
        - expat >=2.6.0
      run:
        - pystring >=1.1.3
    tests:
      - package_contents:
          include:
            - OpenColorIO/OpenColorIO.h
          files:
            - if: not win
              then:
                - if: linux
                  then:
                    - lib/libOpenColorIO.so*
                - if: osx
                  then:
                    - lib/libOpenColorIO*.dylib
                - lib/cmake/OpenColorIO/OpenColorIOConfig.cmake
            - if: win
              then:
                - Library/bin/OpenColorIO_2_5.dll
                - Library/lib/OpenColorIO.lib
                - Library/lib/cmake/OpenColorIO/OpenColorIOConfig.cmake
    about:
      homepage: https://opencolorio.org/
      summary: OpenColorIO core C++ library and headers
      license: BSD-3-Clause
      license_file: ocio_src/LICENSE
      repository: https://github.com/AcademySoftwareFoundation/OpenColorIO
      documentation: https://opencolorio.readthedocs.io/

  - package:
      name: pyopencolorio
      version: ${{ ocio_version }}
    build:
      number: ${{ build_number }}
      string: py${{ python | version_to_buildstring }}_h${{ hash }}_${{ build_number }}
      script:
        env:
          OCIO_BUILD_APPS: "OFF"
          OCIO_BUILD_PYTHON: "ON"
          OCIO_USE_OIIO_FOR_APPS: "OFF"
        file: build-opencolorio
    requirements:
      build:
        - ${{ compiler("cxx") }}
        - cmake >=3.15
        - ninja
        - if: not win
          then: make
        - doxygen
        - if: build_platform != target_platform
          then:
            - python
            - cross-python_${{ target_platform }}
      host:
        - python
        - pybind11
        - ${{ pin_subpackage("opencolorio", exact=True) }}
        - yaml-cpp >=0.8.0
        - minizip >=4.0.0
        - imath >=3.1.1
        - pystring >=1.1.3
        # CMake checks require expat/zlib package names, not only the transitive
        # shared libraries provided by the exact opencolorio pin.
        - expat >=2.6.0
        - zlib >=1.2.13
        # OCIO_BUILD_DOCS=ON triggers doc building to populate Python docstrings.
        - sphinx
        - breathe
        - recommonmark
        - six
      ignore_run_exports:
        from_package:
          - opencolorio
          - yaml-cpp
          - minizip
          - imath
          - pystring
          - expat
          - zlib
      run:
        - python
        - ${{ pin_subpackage("opencolorio", exact=True) }}
    tests:
      - python:
          imports:
            - PyOpenColorIO
          pip_check: true
    about:
      homepage: https://opencolorio.org/
      summary: Python bindings for OpenColorIO
      license: BSD-3-Clause
      license_file: ocio_src/LICENSE
      repository: https://github.com/AcademySoftwareFoundation/OpenColorIO
      documentation: https://opencolorio.readthedocs.io/

  - package:
      name: openimageio
    build:
      number: ${{ build_number }}
      script:
        env:
          OIIO_OUTPUT: core
        file: build-openimageio
    requirements:
      build:
        - ${{ compiler("c") }}
        - ${{ compiler("cxx") }}
        - cmake >=3.18.2
        - ninja
        - pkg-config
      host:
        - ffmpeg >=4.0
        - fmt >=7.0
        - freetype >=2.10.0
        - giflib >=5.0
        - imath >=3.1
        - libheif >=1.11
        - libjpeg-turbo >=2.1
        - libpng >=1.6.0
        - libraw >=0.20
        - libtiff >=4.0
        - libwebp >=1.1
        - openexr >=3.1
        - openjpeg >=2.0
        - tbb-devel >=2017
        - tsl_robin_map >=1.2.0
        - zlib
        # OIIO 3.x additions and enabled integrations.
        - ${{ pin_subpackage("opencolorio", exact=True) }}
        - bzip2
        - dcmtk >=3.6.1
        - libjxl >=0.10.1
        - openjph >=0.21.2
        # Optional integration currently disabled in build-openimageio.
        # - libopencv >=4
        # - openvdb >=9  # Disabled until openvdb-feedstock is split; see issue #41 there.
        # Provides the unversioned libxml2.so linker symlink.
        - libxml2-devel
      ignore_run_exports:
        from_package:
          - fmt
          - libxml2-devel
      run_exports:
        weak:
          - ${{ pin_subpackage("openimageio", upper_bound="x.x") }}
    tests:
      - package_contents:
          include:
            - OpenImageIO/oiioversion.h
          files:
            - if: not win
              then:
                - if: linux
                  then:
                    - lib/libOpenImageIO.so*
                    - lib/libOpenImageIO_Util.so*
                - if: osx
                  then:
                    - lib/libOpenImageIO*.dylib
                    - lib/libOpenImageIO_Util*.dylib
                - lib/cmake/OpenImageIO/OpenImageIOConfig.cmake
                - lib/cmake/OpenImageIO/OpenImageIOTargets.cmake
                - lib/pkgconfig/OpenImageIO.pc
                - share/fonts/OpenImageIO/DroidSans.ttf
            - if: win
              then:
                - Library/bin/OpenImageIO.dll
                - Library/bin/OpenImageIO_Util.dll
                - Library/lib/OpenImageIO.lib
                - Library/lib/OpenImageIO_Util.lib
                - Library/lib/cmake/OpenImageIO/OpenImageIOConfig.cmake
                - Library/lib/cmake/OpenImageIO/OpenImageIOTargets.cmake

  - package:
      name: py-openimageio
    build:
      number: ${{ build_number }}
      string: py${{ python | version_to_buildstring }}_h${{ hash }}_${{ build_number }}
      script:
        env:
          OIIO_OUTPUT: python
        file: build-openimageio
    requirements:
      build:
        - if: build_platform != target_platform
          then:
            - python
            - cross-python_${{ target_platform }}
            - pybind11
            - numpy
        - ${{ compiler("c") }}
        - ${{ compiler("cxx") }}
        - cmake >=3.18.2
        - ninja
        - pkg-config
      host:
        - python
        - numpy
        - pybind11 >=2.7
        - ffmpeg >=4.0
        - fmt >=7.0
        - freetype >=2.10.0
        - giflib >=5.0
        - imath >=3.1
        - libheif >=1.11
        - libjpeg-turbo >=2.1
        - libpng >=1.6.0
        - libraw >=0.20
        - libtiff >=4.0
        - libwebp >=1.1
        - openexr >=3.1
        - openjpeg >=2.0
        - tbb-devel >=2017
        - tsl_robin_map >=1.2.0
        - zlib
        # OIIO 3.x additions and enabled integrations.
        - ${{ pin_subpackage("opencolorio", exact=True) }}
        - bzip2
        - dcmtk >=3.6.1
        - libjxl >=0.10.1
        - openjph >=0.21.2
        # Optional integration currently disabled in build-openimageio.
        # - libopencv >=4
        # - openvdb >=9  # Disabled until openvdb-feedstock is split; see issue #41 there.
        # Provides the unversioned libxml2.so linker symlink.
        - libxml2-devel

      # The build script rebuilds the library (so same host deps need to be present),
      # but the python bits don't need them (and we run-depend on openimageio here)
      ignore_run_exports:
        from_package:
          - opencolorio
          - ffmpeg
          - fmt
          - freetype
          - giflib
          - imath
          - libheif
          - libjpeg-turbo
          - libpng
          - libraw
          - libtiff
          - libwebp
          - numpy
          - openexr
          - openjpeg
          - tbb-devel
          - zlib
          - bzip2
          - dcmtk
          - libjxl
          - libxml2-devel
          - openjph
      run:
        - ${{ pin_subpackage("openimageio", exact=True) }}
        - python
    tests:
      - python:
          imports:
            - OpenImageIO

  - package:
      name: openimageio-tools
    build:
      number: ${{ build_number }}
      script:
        env:
          OIIO_OUTPUT: tools
        file: build-openimageio
    requirements:
      build:
        - ${{ compiler("c") }}
        - ${{ compiler("cxx") }}
        - cmake >=3.18.2
        - ninja
        - pkg-config
      host:
        - ffmpeg >=4.0
        - fmt >=7.0
        - freetype >=2.10.0
        - giflib >=5.0
        - imath >=3.1
        - libheif >=1.11
        - libjpeg-turbo >=2.1
        - libpng >=1.6.0
        - libraw >=0.20
        - libtiff >=4.0
        - libwebp >=1.1
        - openexr >=3.1
        - openjpeg >=2.0
        - tbb-devel >=2017
        - tsl_robin_map >=1.2.0
        - zlib
        # OIIO 3.x additions and enabled integrations.
        - ${{ pin_subpackage("opencolorio", exact=True) }}
        - bzip2
        - dcmtk >=3.6.1
        - libjxl >=0.10.1
        - openjph >=0.21.2
        # Optional integration currently disabled in build-openimageio.
        # - libopencv >=4
        # - openvdb >=9  # Disabled until openvdb-feedstock is split; see issue #41 there.
        # Provides the unversioned libxml2.so linker symlink.
        - libxml2-devel
      # The build script rebuilds the library (so same host deps need to be present),
      # but the python bits don't need them (and we run-depend on openimageio here)
      ignore_run_exports:
        from_package:
          - opencolorio
          - ffmpeg
          - fmt
          - freetype
          - giflib
          - imath
          - libheif
          - libjpeg-turbo
          - libpng
          - libraw
          - libtiff
          - libwebp
          - openexr
          - openjpeg
          - tbb-devel
          - zlib
          - bzip2
          - dcmtk
          - libjxl
          - libxml2-devel
          - openjph
      run:
        - ${{ pin_subpackage("openimageio", exact=True) }}
    tests:
      - script:
          - iconvert --help
          - idiff --help
          - igrep --help
          - iinfo --help
          - maketx --help
          - oiiotool --help

  - package:
      name: opencolorio-tools
      version: ${{ ocio_version }}
    build:
      number: ${{ build_number }}
      script:
        env:
          OCIO_BUILD_APPS: "ON"
          OCIO_BUILD_PYTHON: "OFF"
          OCIO_USE_OIIO_FOR_APPS: "ON"
        file: build-opencolorio
    requirements:
      build:
        - ${{ compiler("cxx") }}
        - cmake >=3.15
        - ninja
        - if: not win
          then: make
      host:
        - ${{ pin_subpackage("opencolorio", exact=True) }}
        - ${{ pin_subpackage("openimageio", exact=True) }}
        # Min versions from OpenColorIO/share/cmake/modules/FindExtPackages.cmake
        - yaml-cpp >=0.8.0
        - minizip >=4.0.0
        - imath >=3.1.1
        - pystring >=1.1.3
        - expat >=2.6.0
        - zlib >=1.2.13
        - lcms2 >=2.2
        - openexr >=3.2.0
        # OpenGL support for GPU-accelerated tools and ociodisplay.
        # OCIO's CheckSupportGL.cmake requires OpenGL + GLUT on all platforms.
        # It also requires GLEW on non-Apple platforms.
        # On macOS, GLUT is expected from the system framework, not from conda.
        # If any required GL dependency is missing, OCIO_GL_ENABLED is OFF and
        # ociodisplay / GPU code paths are skipped at build time.
        # With OCIO_USE_HEADLESS=ON it additionally needs EGL on Linux for
        # headless GPU usage. mesalib provides the software EGL/GL renderer.
        - if: linux
          then:
            - freeglut >=3.2.1
            - glew >=2.1.0
            - libgl-devel
            - libopengl-devel
            - libegl-devel
            - mesalib
        - if: win
          then:
            - freeglut >=3.2.1
            - glew >=2.1.0
      ignore_run_exports:
        from_package:
          - opencolorio
          - openimageio
          - yaml-cpp
          - minizip
          - imath
          - pystring
          - expat
          - zlib
          - lcms2
          - openexr
      run:
        - ${{ pin_subpackage("opencolorio", exact=True) }}
        - ${{ pin_subpackage("openimageio", exact=True) }}
        - if: linux
          then:
            - freeglut
            - glew
            - xorg-libxxf86vm
        - if: win
          then:
            - freeglut
            - glew
    tests:
      - script:
          - if: not win
            then:
              # _h: allow exit codes 0 or 1 (OCIO --help exits 1); fail on >=2 (crash/not-found).
              # Suppress normal help text to keep test logs readable; print output only on real failure.
              - '_h() { _r=0; _out="$("$@" 2>&1)" || _r=$?; [ "$_r" -le 1 ] || { printf "%s\n" "$_out"; return 1; }; }'
              # Minimal valid 1D LUT used by CLI smoke tests.
              - 'printf ''Version 1\nFrom 0 1\nLength 2\nComponents 1\n{\n0.0\n1.0\n}\n'' > /tmp/ocio_identity.spi1d'
              - _h ocioarchive --help
              - _h ociobakelut --help
              - _h ociocheck --help
              - ociochecklut /tmp/ocio_identity.spi1d 0.5 0.5 0.5
              - if not exist %LIBRARY_BIN%\ociocpuinfo.exe exit 1
              - ociocpuinfo
              - _h ociomakeclf --help
              - _h ociomergeconfigs --help
              - _h ocioperf --help
              - _h ociowrite --help
              - _h ocioconvert --help
              - ociolutimage --generate --output /tmp/ocio_lutimage.exr
              - test -f /tmp/ocio_lutimage.exr
              - test -x "$PREFIX/bin/ociodisplay"
              # Verify OpenGL support was compiled into GPU-capable tools.
              # ociochecklut --gpu exits 1 in two cases:
              #   (a) "Compiled without OpenGL support" -> bad build, fail
              #   (b) EGL init failure in headless CI     -> runtime env, allowed
              - |-
                  if [[ "${target_platform:-}" == linux-* ]]; then
                    output="$(ociochecklut --gpu /tmp/ocio_identity.spi1d 0.5 0.5 0.5 2>&1 || true)"
                    echo "$output"
                    if grep -Fq "Compiled without OpenGL support" <<<"$output"; then
                      echo "ERROR: OpenColorIO tools were built without OpenGL support."
                      exit 1
                    fi
                  fi
            else:
              - if not exist %LIBRARY_BIN%\\ocioarchive.exe exit 1
              - if not exist %LIBRARY_BIN%\\ociobakelut.exe exit 1
              - if not exist %LIBRARY_BIN%\\ociocheck.exe exit 1
              - if not exist %LIBRARY_BIN%\\ociochecklut.exe exit 1
              - if not exist %LIBRARY_BIN%\\ociomakeclf.exe exit 1
              - if not exist %LIBRARY_BIN%\\ociomergeconfigs.exe exit 1
              - if not exist %LIBRARY_BIN%\\ocioperf.exe exit 1
              - if not exist %LIBRARY_BIN%\\ociowrite.exe exit 1
              - if not exist %LIBRARY_BIN%\\ocioconvert.exe exit 1
              - ociocpuinfo
              - echo Version 1> %TEMP%\ocio_identity.spi1d
              - echo From 0 1>> %TEMP%\ocio_identity.spi1d
              - echo Length 2>> %TEMP%\ocio_identity.spi1d
              - echo Components 1>> %TEMP%\ocio_identity.spi1d
              - echo {>> %TEMP%\ocio_identity.spi1d
              - echo 0.0>> %TEMP%\ocio_identity.spi1d
              - echo 1.0>> %TEMP%\ocio_identity.spi1d
              - echo }>> %TEMP%\ocio_identity.spi1d
              - ociochecklut %TEMP%\ocio_identity.spi1d 0.5 0.5 0.5
              - ociolutimage --generate --output %TEMP%\ocio_lutimage.exr
              - if not exist %TEMP%\ocio_lutimage.exr exit 1
              - if not exist %LIBRARY_BIN%\\ociodisplay.exe exit 1
    about:
      homepage: https://opencolorio.org/
      summary: OpenColorIO command-line tools built with OpenImageIO integration
      license: BSD-3-Clause
      license_file: ocio_src/LICENSE
      repository: https://github.com/AcademySoftwareFoundation/OpenColorIO
      documentation: https://opencolorio.readthedocs.io/

about:
  homepage: https://openimageio.org
  license: Apache-2.0
  license_file: oiio_src/LICENSE.md
  summary: Libraries, tools, and Python bindings for reading, writing, and processing images
  description: |
    OpenImageIO is a toolset for reading, writing, and manipulating image files of any image file format relevant to VFX / animation via a format-agnostic API with a feature set, scalability, and robustness needed for feature film production.

    The primary target audience for OIIO is VFX studios and developers of tools such as renderers, compositors, viewers, and other image-related software you'd find in a production pipeline.

    OpenImageIO consists of:
    - Simple but powerful ImageInput and ImageOutput APIs that provide an abstraction for reading and writing image files of nearly any format, without the calling application needing to know any of the details of these file formats, and indeed without the calling application needing to be aware of which formats are available.
    - A library that manages subclasses of ImageInput and ImageOutput that implement I/O from specific file formats, with each file format's implementation stored as a plug-in. Therefore, an application using OpenImageIO's APIs can read and write any image file for which a plugin can be found at runtime.
    - Plugins implementing I/O for several popular image file formats, including TIFF, JPEG/JFIF, JPEG XL, OpenEXR, PNG, HDR/RGBE, ICO, BMP, Targa, JPEG-2000, RMan Zfile, FITS, DDS, Softimage PIC, PNM, DPX, Cineon, IFF, OpenVDB, Ptex, Photoshop PSD, Wavefront RLA, SGI, WebP, GIF, DICOM, HEIF/HEIC/AVIF, many "RAW" digital camera formats, and a variety of movie formats (readable as individual frames). More are being developed all the time.
    - Several command line image tools based on these classes, including oiiotool (command-line format conversion and image processing), iinfo (print detailed info about images), iconvert (convert among formats, data types, or modify metadata), idiff (compare images), igrep (search images for matching metadata), and iv (an image viewer). Because these tools are based on ImageInput/ImageOutput, they work with any image formats for which ImageIO plugins are available.
    - An ImageCache class that transparently manages a cache so that it can access truly vast amounts of image data (tens of thousands of image files totaling multiple TB) very efficiently using only a tiny amount (tens of megabytes at most) of runtime memory.
    - A TextureSystem class that provides filtered MIP-map texture lookups, atop the nice caching behavior of ImageCache. This is used in commercial renderers and has been used on many large VFX and animated films.
    - ImageBuf and ImageBufAlgo functions -- a simple class for storing and manipulating whole images in memory, and a collection of the most useful computations you might want to do involving those images, including many image processing operations.
    - Python bindings for all of the major APIs.
  documentation: https://openimageio.readthedocs.io/
  repository: https://github.com/AcademySoftwareFoundation/OpenImageIO

extra:
  recipe-maintainers:
    - SylvainCorlay
    - JohanMabille
    - wolfv
    - lgritz
    - h-vetinari
  feedstock-name: openimageio
